<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MassConnect — AI Business Intake</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;color:#1a1a1a;min-height:100vh;padding:1.5rem 1rem}
.wrap{max-width:720px;margin:0 auto;padding-bottom:100px}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeUp 0.4s ease both}
.typing span{display:inline-block;width:6px;height:6px;border-radius:50%;background:#aaa;margin:0 2px;animation:pulse 1.2s ease infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
.nav{background:#0a2540;border-radius:14px;padding:12px 16px;display:flex;align-items:center;gap:12px;margin-bottom:12px}
.nav-logo{width:38px;height:38px;border-radius:10px;background:#1D9E75;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.nav-title{font-size:15px;font-weight:500;color:#fff}
.nav-sub{font-size:11px;color:#5DCAA5}
.nav-badge{background:#1D9E75;border-radius:20px;padding:4px 12px;font-size:11px;font-weight:500;color:#fff;margin-left:auto}
.advisor-toggle{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:8px;padding:5px 12px;color:#fff;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:6px;margin-right:8px}
.advisor-toggle.on{background:#1D9E75;border-color:#1D9E75}
.tabs{display:flex;gap:6px;margin-bottom:12px}
.tab{flex:1;padding:8px 10px;border:1px solid #e8e8e6;border-radius:10px;background:#fff;font-size:12px;color:#888;cursor:pointer;text-align:center;transition:all 0.2s}
.tab.active{background:#0a2540;border-color:#0a2540;color:#fff;font-weight:500}
.tab.done{background:#E1F5EE;border-color:#1D9E75;color:#0F6E56}
.card{background:#fff;border-radius:16px;border:1px solid #e8e8e6;overflow:hidden;margin-bottom:12px}
.card-header{padding:12px 16px;border-bottom:1px solid #e8e8e6;background:#fafaf9;display:flex;align-items:center;gap:10px}
.chat-area{padding:16px;display:flex;flex-direction:column;gap:10px;max-height:420px;overflow-y:auto}
.msg-ai{display:flex;gap:8px;align-items:flex-start;animation:fadeUp 0.3s ease both}
.msg-user{display:flex;justify-content:flex-end;animation:fadeUp 0.3s ease both}
.bubble-ai{background:#f5f5f3;border:1px solid #e8e8e6;border-radius:12px;padding:10px 14px;font-size:13px;line-height:1.6;max-width:84%}
.bubble-user{background:#1D9E75;border-radius:12px;padding:10px 14px;font-size:13px;line-height:1.6;max-width:84%;color:#fff}
.ai-avatar{width:28px;height:28px;border-radius:8px;background:#E1F5EE;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#0F6E56}
.chat-input{padding:10px 12px;border-top:1px solid #e8e8e6;display:flex;gap:8px;background:#fafaf9}
.chat-input input{flex:1;border:1px solid #e8e8e6;border-radius:8px;padding:9px 12px;font-size:13px;outline:none}
.send-btn{padding:9px 16px;background:#1D9E75;border:none;border-radius:8px;color:#fff;font-size:13px;cursor:pointer;font-weight:500}
.send-btn:disabled{background:#aaa;cursor:default}
.prog-bar{height:4px;background:#e8e8e6;border-radius:2px;margin-bottom:4px}
.prog-fill{height:4px;border-radius:2px;background:#1D9E75;transition:width 0.4s}
.section-label{font-size:11px;font-weight:500;color:#999;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px}
.program-card{border:1px solid #e8e8e6;border-radius:12px;overflow:hidden;margin-bottom:10px}
.prog-header{padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background 0.15s}
.prog-header:hover{background:#f8f9fa}
.elig-badge{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.prog-body{padding:14px;border-top:1px solid #e8e8e6;display:none}
.prog-body.open{display:block}
.crit-row{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid #f0f0ee}
.crit-row:last-child{border-bottom:none}
.crit-icon{width:20px;height:20px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px}
.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;margin:2px}
.btn-primary{padding:10px 20px;background:#1D9E75;border:none;border-radius:10px;color:#fff;font-size:13px;cursor:pointer;font-weight:500}
.btn-primary:hover{background:#0F6E56}
.btn-ghost{padding:8px 16px;border:1px solid #e8e8e6;border-radius:10px;background:#fff;font-size:13px;cursor:pointer;color:#444}
.advisor-panel{position:fixed;bottom:88px;right:24px;width:320px;height:480px;background:#fff;border-radius:16px;border:1px solid #e8e8e6;box-shadow:0 8px 32px rgba(0,0,0,0.15);display:flex;flex-direction:column;z-index:999;overflow:hidden;animation:slideUp 0.25s ease both}
.advisor-fab{position:fixed;bottom:24px;right:24px;width:52px;height:52px;border-radius:50%;background:#1D9E75;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,0.2);z-index:1000;transition:background 0.2s}
.advisor-fab.open{background:#0a2540}
.impact-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.impact-item{background:#f8f9fa;border-radius:8px;padding:8px 10px}
.priority-row{display:flex;align-items:center;gap:12px;padding:12px;border-radius:10px;margin-bottom:8px;cursor:pointer;border:1px solid transparent;transition:all 0.15s}
.priority-row:hover{background:#f8f9fa;border-color:#e8e8e6}
.priority-row.sel{background:#E1F5EE;border-color:#1D9E75}
.score-circle{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:500;flex-shrink:0}
.appfield{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #f0f0ee}
.appfield:last-child{border-bottom:none}
.appfield-ic{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
@media(max-width:520px){.advisor-panel{width:calc(100vw - 32px);right:16px}.impact-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
<div class="nav">
  <div class="nav-logo">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
  </div>
  <div><div class="nav-title">MassConnect</div><div class="nav-sub">Massachusetts Business Front Door</div></div>
  <button class="advisor-toggle" id="adv-toggle" onclick="toggleAdvisor()">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
    Ask advisor
  </button>
  <div class="nav-badge">● Live</div>
</div>
<div class="tabs" id="tabs">
  <button class="tab active" onclick="goTo(0)">1. Welcome</button>
  <button class="tab" onclick="goTo(1)">2. Conversation</button>
  <button class="tab" onclick="goTo(2)">3. Scorecard</button>
  <button class="tab" onclick="goTo(3)">4. Application</button>
  <button class="tab" onclick="goTo(4)">5. Staff View</button>
</div>
<div id="stage"></div>
</div>

<button class="advisor-fab" id="adv-fab" onclick="toggleAdvisor()">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
</button>

<div class="advisor-panel" id="adv-panel" style="display:none">
  <div style="background:#0a2540;padding:12px 14px;display:flex;align-items:center;gap:10px">
    <div style="width:32px;height:32px;border-radius:8px;background:#1D9E75;display:flex;align-items:center;justify-content:center;flex-shrink:0">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
    </div>
    <div><div style="font-size:13px;font-weight:500;color:#fff">MassConnect Advisor</div><div style="font-size:11px;color:#5DCAA5">Ask me anything</div></div>
    <button onclick="toggleAdvisor()" style="margin-left:auto;background:none;border:none;color:#fff;cursor:pointer;font-size:20px;line-height:1">×</button>
  </div>
  <div id="adv-msgs" style="flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px">
    <div style="text-align:center;padding:1rem">
      <div style="font-size:13px;font-weight:500;margin-bottom:6px">Your program advisor</div>
      <div style="font-size:12px;color:#666;margin-bottom:14px;line-height:1.6">Ask about programs, eligibility, or get help with your application.</div>
      <div style="display:grid;gap:6px">
        <button onclick="askAdvisor('What documents do I need?')" style="padding:8px 12px;background:#f8f9fa;border:1px solid #e8e8e6;border-radius:8px;font-size:12px;cursor:pointer;text-align:left;color:#444">What documents do I need?</button>
        <button onclick="askAdvisor('How long does the application take?')" style="padding:8px 12px;background:#f8f9fa;border:1px solid #e8e8e6;border-radius:8px;font-size:12px;cursor:pointer;text-align:left;color:#444">How long does the application take?</button>
        <button onclick="askAdvisor('Help me write my business narrative')" style="padding:8px 12px;background:#f8f9fa;border:1px solid #e8e8e6;border-radius:8px;font-size:12px;cursor:pointer;text-align:left;color:#444">Help me write my business narrative</button>
        <button onclick="askAdvisor('What is MWBE certification?')" style="padding:8px 12px;background:#f8f9fa;border:1px solid #e8e8e6;border-radius:8px;font-size:12px;cursor:pointer;text-align:left;color:#444">What is MWBE certification?</button>
      </div>
    </div>
  </div>
  <div style="padding:8px 10px;border-top:1px solid #e8e8e6;display:flex;gap:6px">
    <input id="adv-input" placeholder="Ask anything..." style="flex:1;border:1px solid #e8e8e6;border-radius:8px;padding:7px 10px;font-size:12px;outline:none" onkeydown="if(event.key==='Enter')sendAdvisor()">
    <button onclick="sendAdvisor()" style="padding:7px 12px;background:#1D9E75;border:none;border-radius:8px;color:#fff;font-size:12px;cursor:pointer;font-weight:500">→</button>
  </div>
</div>

<script>
const API = '/api/chat';
const HAIKU = 'claude-haiku-4-5-20251001';

const SYSTEM = `You are MassConnect, an AI intake agent for the Massachusetts Executive Office of Economic Development (EOED). Have a warm, conversational intake interview with a business owner to assess their eligibility for Massachusetts state programs.

PROGRAMS:
1. MassDevelopment Small Business Loan - Equipment/working capital. Requires: 2+ years, MA-based, collateral, viable financials.
2. EDIP - Tax incentives. Requires: $500K+ investment OR 10+ new full-time jobs, municipal sponsor.
3. MWBE Certification - State contracting preferences. Requires: 51%+ minority/women ownership, MA-based, for-profit.
4. Workforce Training Fund - Training subsidies. Requires: MA employer, paying UI, training for workers.
5. MassCEC Clean Energy - Clean energy sector or energy efficiency upgrades.
6. MLSC Life Sciences - Biotech/medtech, MA-based.
7. SBDC - Free counseling, all MA small businesses.

FLOW: Ask ONE question at a time. Gather: (1) business type + location, (2) years operating, (3) employees, (4) revenue, (5) expansion plans + capital needs, (6) programs they want considered, (7) ownership demographics. Never use markdown. Plain text only. Under 80 words per response.

After 7 topics covered output ASSESSMENT_READY then <SCORECARD>{json}</SCORECARD>.

SCORECARD JSON FORMAT:
{"businessProfile":{"type":"","location":"","years":0,"employees":0,"revenue":"","tags":[]},"selfNominated":[{"program":"","status":"strong|good|partial|no","reason":"","criteria":[{"met":"yes|partial|no","label":"","detail":"","tip":""}]}],"recommended":[{"program":"","status":"strong|good|partial","reason":"","criteria":[{"met":"yes|partial|no","label":"","detail":"","tip":""}]}],"staffScore":0,"staffTier":"white-glove|priority|standard","impactProfile":{"jobs":"High|Medium|Low","region":"High|Medium|Low","diversity":"High|Medium|Low","sector":"High|Medium|Low","sustainability":"High|Medium|Low"}}`;

const ADV_SYS = `You are a Massachusetts business program advisor embedded in MassConnect. Help business owners understand programs, navigate applications, and prepare strong submissions. Be warm, concise, and actionable. Plain text only. Under 150 words.`;

let cur=0, chatMsgs=[], scorecard=null, chatLoading=false, advMsgs=[], advLoading=false, advOpen=false;

async function callAPI(messages, system, maxTokens=800, model=HAIKU) {
  const r = await fetch(API, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({messages, system, max_tokens:maxTokens, model})
  });
  const d = await r.json();
  return d.content?.map(b=>b.text||'').join('').replace(/\*\*(.*?)\*\*/g,'$1')||'';
}

function parseScorecard(txt) {
  try { const m=txt.match(/<SCORECARD>([\s\S]*?)<\/SCORECARD>/); if(m) return JSON.parse(m[1].trim()); } catch(e){}
  return null;
}

function buildFallback(msgs) {
  const ctx=msgs.filter(m=>m.role==='user').map(m=>m.content).join(' ').toLowerCase();
  const min=ctx.includes('hispanic')||ctx.includes('minority')||ctx.includes('latina')||ctx.includes('black');
  const wom=ctx.includes('woman')||ctx.includes('female');
  const emp=ctx.match(/(\d+)\s*employee/)?.[1];
  const staffScore = min||wom ? 78 : 65;
  const staffTier = staffScore >= 85 ? 'white-glove' : staffScore >= 70 ? 'priority' : 'standard';
  return {
    businessProfile:{type:'Small business',location:'Massachusetts',years:3,employees:emp?parseInt(emp):5,revenue:'Not specified',tags:['Massachusetts',...(min?['Minority-owned']:[]),...(wom?['Woman-owned']:[])]},
    selfNominated:[],
    recommended:[
      {program:'MassDevelopment Small Business Loan',status:'good',reason:'Based on your profile you may qualify for equipment and working capital financing.',criteria:[{met:'yes',label:'Massachusetts-based',detail:'Confirmed',tip:''},{met:'partial',label:'Collateral available',detail:'Equipment or assets may qualify',tip:'Document all business assets before applying'}]},
      ...(min||wom?[{program:'MWBE Certification',status:'strong',reason:'As a minority or woman-owned business you likely qualify for state contracting preferences.',criteria:[{met:'yes',label:'Minority or woman ownership',detail:'Confirmed',tip:''},{met:'partial',label:'Owner day-to-day control',detail:'Must document management role',tip:'Prepare an org chart'}]}]:[]),
      {program:'Small Business Development Center (SBDC)',status:'strong',reason:'Free counseling available to all Massachusetts small businesses.',criteria:[{met:'yes',label:'Massachusetts small business',detail:'Confirmed',tip:''}]}
    ],
    staffScore,
    staffTier,
    impactProfile:{jobs:emp&&parseInt(emp)>10?'High':'Medium',region:'Medium',diversity:min||wom?'High':'Low',sector:'Medium',sustainability:'Low'}
  };
}

const SC={strong:{bg:'#E1F5EE',tc:'#085041',label:'Strong fit'},good:{bg:'#E6F1FB',tc:'#042C53',label:'Good fit'},partial:{bg:'#FAEEDA',tc:'#412402',label:'Partial fit'},no:{bg:'#FAECE7',tc:'#712B13',label:'Not a fit'}};
const IC={High:'#1D9E75',Medium:'#EF9F27',Low:'#aaa'};

function progCard(p) {
  const c=SC[p.status]||SC.good;
  const id='p'+Math.random().toString(36).substr(2,6);
  return `<div class="program-card">
  <div class="prog-header" onclick="toggleProg('${id}')">
    <div style="flex:1"><div style="font-size:13px;font-weight:500;margin-bottom:2px">${p.program}</div><div style="font-size:11px;color:#888">${p.reason}</div></div>
    <span class="elig-badge" style="background:${c.bg};color:${c.tc}">${c.label}</span>
    <span style="color:#aaa;font-size:11px;margin-left:6px" id="arr-${id}">▼</span>
  </div>
  <div class="prog-body" id="${id}">
    ${(p.criteria||[]).map(cr=>{
      const ic=cr.met==='yes'?`<div class="crit-icon" style="background:#1D9E75"><svg width="10" height="10" viewBox="0 0 10 10"><polyline points="1 5 4 8 9 2" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/></svg></div>`:
        cr.met==='partial'?`<div class="crit-icon" style="background:#EF9F27"><svg width="10" height="10" viewBox="0 0 10 10"><line x1="5" y1="2" x2="5" y2="6" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/><circle cx="5" cy="8.2" r="0.9" fill="#fff"/></svg></div>`:
        `<div class="crit-icon" style="background:#D85A30"><svg width="10" height="10" viewBox="0 0 10 10"><line x1="2" y1="2" x2="8" y2="8" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/><line x1="8" y1="2" x2="2" y2="8" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/></svg></div>`;
      return `<div class="crit-row">${ic}<div style="flex:1"><div style="font-size:13px;font-weight:500">${cr.label}</div><div style="font-size:12px;color:#666;margin-top:2px;line-height:1.5">${cr.detail}</div>${cr.tip?`<div style="font-size:11px;margin-top:5px;padding:6px 10px;border-radius:6px;background:#EEF6FF;color:#1a4fa0;line-height:1.5">💡 ${cr.tip}</div>`:''}</div></div>`;
    }).join('')}
  </div>
</div>`;
}

function renderWelcome(){return`<div class="card fade"><div style="background:#0a2540;padding:2.5rem 2rem;text-align:center"><div style="width:60px;height:60px;border-radius:16px;background:#1D9E75;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div><div style="font-size:26px;font-weight:500;color:#fff;margin-bottom:8px">Find the right support for your business</div><div style="font-size:14px;color:#8aa0b8;max-width:400px;margin:0 auto 2rem;line-height:1.6">Answer a few plain-language questions. We'll match you to Massachusetts programs you qualify for — and help you apply.</div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;max-width:420px;margin:0 auto 2rem">${[['50+','Programs'],['$250M','Annual funding'],['5 min','To complete']].map(([v,l])=>`<div style="background:rgba(255,255,255,0.08);border-radius:10px;padding:12px;border:1px solid rgba(255,255,255,0.1)"><div style="font-size:20px;font-weight:500;color:#5DCAA5">${v}</div><div style="font-size:11px;color:#8aa0b8;margin-top:3px">${l}</div></div>`).join('')}</div><button class="btn-primary" onclick="startChat()" style="font-size:14px;padding:12px 32px;border-radius:12px">Get started — it's free</button><div style="font-size:11px;color:#8aa0b8;margin-top:10px">No account needed · Takes about 5 minutes</div></div><div style="padding:1.25rem;display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">${[['💬','Guided conversation','Answer plain-language questions'],['📋','Instant scorecard','See which programs fit and why'],['📝','Application prep','AI helps you draft your application']].map(([ic,t,d])=>`<div style="background:#f8f9fa;border-radius:10px;padding:12px;text-align:center"><div style="font-size:22px;margin-bottom:6px">${ic}</div><div style="font-size:13px;font-weight:500;margin-bottom:3px">${t}</div><div style="font-size:11px;color:#666;line-height:1.5">${d}</div></div>`).join('')}</div></div>`;}

function renderChat(){
  let html=`<div class="card fade"><div class="card-header"><div class="ai-avatar">MC</div><div><div style="font-size:13px;font-weight:500">MassConnect AI</div><div style="font-size:11px;color:#888">Eligibility assessment</div></div><div style="margin-left:auto;font-size:11px;color:#1D9E75;font-weight:500">● Live</div></div><div class="chat-area" id="chat-area">`;
  chatMsgs.forEach(m=>{
    if(m.role==='assistant') html+=`<div class="msg-ai"><div class="ai-avatar">MC</div><div class="bubble-ai">${m.content}</div></div>`;
    else html+=`<div class="msg-user"><div class="bubble-user">${m.content}</div></div>`;
  });
  if(chatLoading) html+=`<div class="msg-ai"><div class="ai-avatar">MC</div><div class="bubble-ai typing"><span></span><span></span><span></span></div></div>`;
  html+=`<div id="chat-bottom"></div></div><div class="chat-input"><input id="chat-input" placeholder="Type your answer..." onkeydown="if(event.key==='Enter')sendChat()" ${chatLoading?'disabled':''}><button class="send-btn" onclick="sendChat()" ${chatLoading?'disabled':''}>→</button></div></div>`;
  html+=`<div style="background:#fff;border-radius:12px;padding:10px 14px;border:1px solid #e8e8e6"><div style="font-size:11px;color:#888;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.5px;font-weight:500">Progress</div><div class="prog-bar"><div class="prog-fill" style="width:${Math.min(chatMsgs.filter(m=>m.role==='user').length/7*100,100)}%"></div></div><div style="display:flex;justify-content:space-between;font-size:11px;color:#aaa;margin-top:3px"><span>Started</span><span>${chatMsgs.filter(m=>m.role==='user').length>=7?'✓ Complete':`${chatMsgs.filter(m=>m.role==='user').length}/7 questions`}</span></div></div>`;
  return html;
}

function renderScorecard(){
  if(!scorecard) return '<div style="padding:2rem;text-align:center;color:#888">Complete the conversation first.</div>';
  const bp=scorecard.businessProfile||{};
  return `<div class="fade"><div style="background:#fff;border-radius:14px;border:1px solid #e8e8e6;padding:16px;margin-bottom:12px"><div style="font-size:11px;color:#999;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px">Your business profile</div><div style="font-size:14px;font-weight:500;margin-bottom:4px">${bp.type||'Your business'} · ${bp.location||'Massachusetts'}</div><div style="font-size:12px;color:#888;margin-bottom:10px">${bp.years||0} years · ${bp.employees||0} employees · ${bp.revenue||'Not specified'}</div><div style="display:flex;flex-wrap:wrap;gap:4px">${(bp.tags||[]).map(t=>`<span class="tag" style="background:#E1F5EE;color:#085041">${t}</span>`).join('')}</div></div>${(scorecard.selfNominated||[]).length>0?`<div style="margin-bottom:16px"><div class="section-label">Programs you asked about</div>${(scorecard.selfNominated||[]).map(p=>progCard(p)).join('')}</div>`:''}<div style="margin-bottom:16px"><div class="section-label">Programs we recommend for you</div>${(scorecard.recommended||[]).map(p=>progCard(p)).join('')}</div><div style="background:#0a2540;border-radius:14px;padding:20px;text-align:center"><div style="font-size:15px;font-weight:500;color:#fff;margin-bottom:6px">Ready to apply?</div><div style="font-size:13px;color:#8aa0b8;margin-bottom:16px;line-height:1.6">Let AI help you prepare your application using everything from your conversation.</div><button class="btn-primary" onclick="goTo(3)">Prepare my application →</button></div></div>`;
}

let selectedProgram = null;
let loanAmount = '';

function getAllPrograms() {
  if (!scorecard) return [];
  return [...(scorecard.selfNominated||[]), ...(scorecard.recommended||[])].filter(p => p.status !== 'no');
}

function renderAppPrep(){
  if(!scorecard) return '<div style="padding:2rem;text-align:center;color:#888">Complete the conversation first.</div>';
  const allProgs = getAllPrograms();
  if (!selectedProgram && allProgs.length > 0) selectedProgram = allProgs[0].program;
  const prog = allProgs.find(p => p.program === selectedProgram) || allProgs[0] || {};
  const bp = scorecard.businessProfile||{};
  const ss = {complete:{bg:'#E1F5EE',tc:'#085041',ic:'✓',lbl:'Pre-filled'},review:{bg:'#FAEEDA',tc:'#412402',ic:'~',lbl:'Review'},missing:{bg:'#FAECE7',tc:'#712B13',ic:'!',lbl:'Required'}};
  const SC2 = {strong:{bg:'#E1F5EE',tc:'#085041',label:'Strong fit'},good:{bg:'#E6F1FB',tc:'#042C53',label:'Good fit'},partial:{bg:'#FAEEDA',tc:'#412402',label:'Partial fit'}};

  // Build fields based on selected program
  const isMWBE = selectedProgram?.includes('MWBE');
  const isWorkforce = selectedProgram?.includes('Workforce');
  const isSBDC = selectedProgram?.includes('SBDC');
  const isLoan = selectedProgram?.includes('MassDevelopment') || selectedProgram?.includes('Loan');
  const isEDIP = selectedProgram?.includes('EDIP');
  const isMassCEC = selectedProgram?.includes('MassCEC') || selectedProgram?.includes('Clean Energy');

  let fields = [
    {label:'Business name', value:bp.type||'', status:'complete'},
    {label:'Business location', value:bp.location||'', status:'complete'},
    {label:'Years in operation', value:bp.years?`${bp.years} years`:'', status:'complete'},
    {label:'Number of employees', value:bp.employees?`${bp.employees} employees`:'', status:'complete'},
    {label:'Annual revenue', value:bp.revenue||'', status:bp.revenue?'complete':'review'},
  ];

  if (isLoan) {
    fields.push({label:'Loan amount requested', value:loanAmount||'', status:loanAmount?'complete':'review'});
    fields.push({label:'Purpose of funds', value:'Business expansion and equipment', status:'review'});
    fields.push({label:'Collateral available', value:'', status:'missing'});
    fields.push({label:'Business tax returns (2 years)', value:'', status:'missing'});
    fields.push({label:'Personal financial statement', value:'', status:'missing'});
  }
  if (isMWBE) {
    fields.push({label:'Ownership demographic', value:(bp.tags||[]).filter(t=>t.includes('owned')).join(', ')||'', status:'complete'});
    fields.push({label:'Owner day-to-day control documentation', value:'', status:'missing'});
    fields.push({label:'Business registration certificate', value:'', status:'missing'});
    fields.push({label:'Org chart showing ownership structure', value:'', status:'missing'});
  }
  if (isWorkforce) {
    fields.push({label:'Number of employees to train', value:bp.employees?`Up to ${bp.employees} employees`:'', status:'review'});
    fields.push({label:'Training provider', value:'', status:'missing'});
    fields.push({label:'Training plan description', value:'', status:'missing'});
    fields.push({label:'UI account number', value:'', status:'missing'});
  }
  if (isSBDC) {
    fields.push({label:'Primary business challenge', value:'Growth and expansion planning', status:'review'});
    fields.push({label:'Preferred SBDC location', value:bp.location||'', status:'review'});
  }
  if (isEDIP) {
    fields.push({label:'Planned capital investment', value:loanAmount||'', status:loanAmount?'complete':'missing'});
    fields.push({label:'Net new jobs projected', value:'', status:'missing'});
    fields.push({label:'Municipal sponsor', value:'', status:'missing'});
    fields.push({label:'Investment timeline', value:'', status:'missing'});
  }
  if (isMassCEC) {
    fields.push({label:'Clean energy technology type', value:'', status:'missing'});
    fields.push({label:'Current energy usage/costs', value:'', status:'missing'});
    fields.push({label:'Project description', value:'', status:'missing'});
  }

  return `<div class="fade">
  <div style="background:#fff;border-radius:14px;border:1px solid #e8e8e6;padding:14px;margin-bottom:12px">
    <div style="font-size:11px;color:#999;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px">Select a program to apply for</div>
    <div style="display:grid;gap:8px">
      ${allProgs.map(p => {
        const c = SC2[p.status]||SC2.good;
        const sel = p.program === selectedProgram;
        return `<div onclick="selectProgram('${p.program.replace(/'/g,"\\'")}')" style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;border:2px solid ${sel?'#1D9E75':'#e8e8e6'};background:${sel?'#E1F5EE':'#fff'};cursor:pointer;transition:all 0.15s">
          <div style="width:18px;height:18px;border-radius:50%;border:2px solid ${sel?'#1D9E75':'#ddd'};background:${sel?'#1D9E75':'#fff'};display:flex;align-items:center;justify-content:center;flex-shrink:0">
            ${sel?'<svg width="8" height="8" viewBox="0 0 10 10"><polyline points="1 5 4 8 9 2" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>':''}
          </div>
          <div style="flex:1"><div style="font-size:13px;font-weight:${sel?'500':'400'};color:${sel?'#085041':'#1a1a1a'}">${p.program}</div></div>
          <span style="background:${c.bg};color:${c.tc};font-size:10px;font-weight:500;padding:2px 8px;border-radius:10px">${c.label}</span>
        </div>`;
      }).join('')}
    </div>
  </div>

  <div class="card">
    <div style="padding:12px 16px;background:#E1F5EE;border-bottom:1px solid #c8ead8;display:flex;align-items:center;gap:10px">
      <div style="width:28px;height:28px;border-radius:8px;background:#1D9E75;display:flex;align-items:center;justify-content:center">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      </div>
      <div>
        <div style="font-size:13px;font-weight:500;color:#085041">Application prep — ${selectedProgram||'Select a program above'}</div>
        <div style="font-size:11px;color:#0F6E56">Pre-populated from your conversation</div>
      </div>
    </div>
    <div style="padding:16px">
      ${isLoan && !loanAmount ? `<div style="background:#FFF8E6;border:1px solid #EF9F27;border-radius:10px;padding:12px;margin-bottom:14px;display:flex;align-items:center;gap:10px">
        <span style="font-size:18px">💰</span>
        <div style="flex:1">
          <div style="font-size:12px;font-weight:500;color:#412402;margin-bottom:6px">How much are you looking to borrow?</div>
          <div style="display:flex;gap:8px">
            <input id="loan-input" placeholder="e.g. $75,000" style="flex:1;border:1px solid #EF9F27;border-radius:8px;padding:7px 10px;font-size:13px;outline:none">
            <button onclick="saveLoanAmount()" style="padding:7px 14px;background:#EF9F27;border:none;border-radius:8px;color:#fff;font-size:12px;cursor:pointer;font-weight:500">Save</button>
          </div>
        </div>
      </div>` : ''}
      ${fields.map(f=>{const s=ss[f.status]||ss.missing;return`<div class="appfield"><div class="appfield-ic" style="background:${s.bg};color:${s.tc}">${s.ic}</div><div style="flex:1"><div style="font-size:11px;color:#888">${f.label}</div><div style="font-size:13px;font-weight:500;color:${f.status==='missing'?'#aaa':'#1a1a1a'}">${f.value||'Not yet provided'}</div></div><span style="background:${s.bg};color:${s.tc};font-size:10px;font-weight:500;padding:2px 8px;border-radius:10px">${s.lbl}</span></div>`;}).join('')}
      <div style="margin-top:16px;background:#EEF6FF;border-radius:10px;padding:12px;border:1px solid #bbd4f5">
        <div style="font-size:12px;font-weight:500;color:#1a4fa0;margin-bottom:4px">💡 Navigator guidance</div>
        <div style="font-size:12px;color:#1a4fa0;line-height:1.6">${
          isLoan ? 'Gather your last 2 years of business tax returns and a list of business assets. Your navigator will review collateral value in your first meeting.' :
          isMWBE ? 'MWBE certification takes 60-90 days. Start this process in parallel with any loan applications to maximize your state contracting opportunities.' :
          isWorkforce ? 'Contact WorkForce Central in your region to identify approved training providers before applying. Having a provider lined up speeds approval significantly.' :
          isSBDC ? 'SBDC counseling is completely free and available immediately. Your local center can also help you prepare applications for other programs.' :
          isEDIP ? 'Contact your municipal economic development office first to discuss sponsorship — this is required and can take several weeks to arrange.' :
          'Use the advisor button to get help writing any section of your application.'
        }</div>
      </div>
    </div>
  </div>
</div>`;
}

function selectProgram(name) {
  selectedProgram = name;
  render();
}

function saveLoanAmount() {
  const inp = document.getElementById('loan-input');
  if (inp && inp.value.trim()) {
    loanAmount = inp.value.trim();
    render();
  }
}

function renderStaff(){
  // Normalize tier based on actual score
  function normalizeTier(score) {
    if (score >= 85) return 'white-glove';
    if (score >= 70) return 'priority';
    return 'standard';
  }
  const rawScore = scorecard ? scorecard.staffScore : 75;
  const normalizedTier = normalizeTier(rawScore);
  const businesses=[
    {name:scorecard?(scorecard.businessProfile?.type||'Your business'):'Your business',biz:scorecard?(scorecard.businessProfile?.location||'Massachusetts'):'Massachusetts',score:rawScore,tier:normalizedTier,programs:scorecard?(scorecard.recommended||[]):[],impact:scorecard?scorecard.impactProfile:{}},
    {name:'James Chen',biz:'Tech startup · Boston',score:82,tier:'priority',programs:[{program:'MassTech AI Program',status:'strong'},{program:'MLSC Tax Incentive',status:'good'}],impact:{jobs:'High',region:'Medium',diversity:'Medium',sector:'High',sustainability:'Medium'}},
    {name:'GreenBuild Co.',biz:'Construction · Springfield',score:76,tier:'standard',programs:[{program:'MassCEC Clean Energy',status:'strong'}],impact:{jobs:'Medium',region:'High',diversity:'Low',sector:'High',sustainability:'High'}},
    {name:'Sarah Patel',biz:'Retail · Cambridge',score:61,tier:'standard',programs:[{program:'SBDC Counseling',status:'good'}],impact:{jobs:'Low',region:'Low',diversity:'High',sector:'Low',sustainability:'Low'}}
  ];
  const tierBadge=t=>t==='white-glove'?`<span style="background:#0a2540;color:#fff;border-radius:6px;padding:3px 10px;font-size:11px;font-weight:500">★ White glove</span>`:t==='priority'?`<span style="background:#FAEEDA;color:#854F0B;border-radius:6px;padding:3px 8px;font-size:11px;font-weight:500">Priority</span>`:`<span style="background:#f0f0ee;color:#666;border-radius:6px;padding:3px 8px;font-size:11px">Standard</span>`;
  const b=businesses[0];
  return `<div class="fade"><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px">${[['4','Inquiries today'],['500','1:1 slots/year'],['88','Avg top score']].map(([v,l])=>`<div style="background:#fff;border-radius:10px;border:1px solid #e8e8e6;padding:12px;text-align:center"><div style="font-size:22px;font-weight:500;color:#0a2540">${v}</div><div style="font-size:11px;color:#888;margin-top:3px">${l}</div></div>`).join('')}</div><div style="display:grid;grid-template-columns:260px 1fr;gap:12px;align-items:start"><div style="background:#fff;border-radius:14px;border:1px solid #e8e8e6;padding:14px"><div class="section-label">Priority queue</div>${businesses.map((b,i)=>`<div class="priority-row ${i===0?'sel':''}" onclick="selectBiz(${i})"><div class="score-circle" style="background:${b.score>=85?'#E1F5EE':b.score>=75?'#FAEEDA':'#f0f0ee'};color:${b.score>=85?'#0F6E56':b.score>=75?'#854F0B':'#666'}">${b.score}</div><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:500">${b.name}</div><div style="font-size:11px;color:#888">${b.biz}</div></div>${tierBadge(b.tier)}</div>`).join('')}</div><div id="biz-detail" style="background:#fff;border-radius:14px;border:1px solid #e8e8e6;padding:14px"><div style="display:flex;align-items:center;gap:10px;margin-bottom:14px"><div class="score-circle" style="background:#E1F5EE;color:#0F6E56;width:50px;height:50px;font-size:18px">${b.score}</div><div><div style="font-size:15px;font-weight:500">${b.name}</div><div style="font-size:12px;color:#888">${b.biz}</div></div><div style="margin-left:auto">${tierBadge(b.tier)}</div></div><div class="section-label">Programs by eligibility & impact</div>${b.programs.map(p=>{const c=SC[p.status]||SC.good;return`<div style="background:#f8f9fa;border-radius:10px;padding:12px;margin-bottom:8px;border:1px solid #e8e8e6"><div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><span style="font-size:13px;font-weight:500;flex:1">${p.program}</span><span style="background:${c.bg};color:${c.tc};font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px">${c.label}</span></div><div class="impact-grid">${Object.entries(b.impact||{}).map(([k,v])=>`<div class="impact-item"><div style="font-size:11px;color:#888;margin-bottom:2px">${k.charAt(0).toUpperCase()+k.slice(1)}</div><div style="font-size:12px;font-weight:500;color:${IC[v]||'#aaa'}">${v}</div></div>`).join('')}</div></div>`;}).join('')}<div style="margin-top:12px;display:flex;gap:8px"><button class="btn-primary" style="flex:1;font-size:12px">Schedule engagement</button><button class="btn-ghost" style="font-size:12px">View full profile</button></div></div></div></div>`;
}

const stages=[renderWelcome,renderChat,renderScorecard,renderAppPrep,renderStaff];

function render(){
  document.getElementById('stage').innerHTML=stages[cur]();
  document.querySelectorAll('.tab').forEach((t,i)=>{t.classList.toggle('active',i===cur);t.classList.toggle('done',i<cur);});
  if(cur===1){const b=document.getElementById('chat-bottom');if(b)b.scrollIntoView();}
}

function goTo(i){cur=i;render();}

async function startChat(){
  goTo(1); chatLoading=true; render();
  try {
    const txt=await callAPI([{role:'user',content:"Hello, I'd like to find out what Massachusetts programs I might qualify for."}],SYSTEM,200);
    chatMsgs=[{role:'user',content:"Hello, I'd like to find out what Massachusetts programs I might qualify for."},{role:'assistant',content:txt}];
  } catch(e){chatMsgs=[{role:'assistant',content:"Hi! I'm MassConnect. What does your business do and where are you located?"}];}
  chatLoading=false; render();
}

async function sendChat(){
  const inp=document.getElementById('chat-input');
  if(!inp||!inp.value.trim()||chatLoading) return;
  const msg=inp.value.trim(); inp.value='';
  chatMsgs.push({role:'user',content:msg}); chatLoading=true; render();
  const userCount=chatMsgs.filter(m=>m.role==='user').length;
  const force=userCount>=6;
  const sys=force?SYSTEM+'\n\nCRITICAL: Output ASSESSMENT_READY then <SCORECARD> JSON now. No more questions.':SYSTEM;
  const msgs=force?[...chatMsgs,{role:'user',content:'Generate my assessment now.'}]:chatMsgs;
  try {
    const txt=await callAPI(msgs,sys,1500);
    if(txt.includes('ASSESSMENT_READY')||txt.includes('<SCORECARD>')){
      scorecard=parseScorecard(txt)||buildFallback(chatMsgs);
      const clean=txt.replace('ASSESSMENT_READY','').replace(/<SCORECARD>[\s\S]*?<\/SCORECARD>/,'').trim();
      chatMsgs.push({role:'assistant',content:clean||'Your scorecard is ready — tap the Scorecard tab above.'});
      chatLoading=false; render(); setTimeout(()=>goTo(2),1200);
    } else { chatMsgs.push({role:'assistant',content:txt}); chatLoading=false; render(); }
  } catch(e){
    scorecard=buildFallback(chatMsgs);
    chatMsgs.push({role:'assistant',content:'Your scorecard is ready — tap the Scorecard tab above.'});
    chatLoading=false; render(); setTimeout(()=>goTo(2),1200);
  }
}

function toggleProg(id){const el=document.getElementById(id);const arr=document.getElementById('arr-'+id);if(el){el.classList.toggle('open');if(arr)arr.textContent=el.classList.contains('open')?'▲':'▼';}}
function selectBiz(i){document.querySelectorAll('.priority-row').forEach((r,j)=>r.classList.toggle('sel',j===i));}

function toggleAdvisor(){
  advOpen=!advOpen;
  document.getElementById('adv-panel').style.display=advOpen?'flex':'none';
  document.getElementById('adv-fab').classList.toggle('open',advOpen);
  document.getElementById('adv-toggle').classList.toggle('on',advOpen);
}

async function sendAdvisor(){
  const inp=document.getElementById('adv-input');
  if(!inp||!inp.value.trim()||advLoading) return;
  const msg=inp.value.trim(); inp.value='';
  const sugg=document.querySelector('#adv-msgs > div');
  if(sugg&&sugg.style.textAlign==='center') sugg.style.display='none';
  addAdvBubble(msg,false); advLoading=true;
  const ctx=chatMsgs.filter(m=>m.role==='user').map(m=>m.content).join(' | ');
  const sc=scorecard?`Business: ${scorecard.businessProfile?.type} in ${scorecard.businessProfile?.location}. Programs: ${(scorecard.recommended||[]).map(p=>p.program).join(', ')}`:'No scorecard yet.';
  const sys=ADV_SYS+`\n\nUSER CONTEXT: ${ctx}\nSCORECARD: ${sc}`;
  advMsgs.push({role:'user',content:msg});
  try {
    const txt=await callAPI(advMsgs,sys,300);
    advMsgs.push({role:'assistant',content:txt}); addAdvBubble(txt,true);
  } catch(e){addAdvBubble('Connection issue — please try again.',true);}
  advLoading=false;
}

function askAdvisor(msg){document.getElementById('adv-input').value=msg;sendAdvisor();}

function addAdvBubble(txt,isAI){
  const c=document.getElementById('adv-msgs');
  const d=document.createElement('div');
  d.style.cssText=isAI?'display:flex;gap:6px;align-items:flex-start':'display:flex;justify-content:flex-end';
  d.innerHTML=isAI?`<div style="width:24px;height:24px;border-radius:6px;background:#E1F5EE;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:#0F6E56">MC</div><div style="background:#f5f5f3;border:1px solid #e8e8e6;border-radius:10px;padding:8px 12px;font-size:12px;line-height:1.6;max-width:85%">${txt}</div>`:`<div style="background:#1D9E75;border-radius:10px;padding:8px 12px;font-size:12px;line-height:1.6;max-width:85%;color:#fff">${txt}</div>`;
  c.appendChild(d); c.scrollTop=c.scrollHeight;
}

render();
</script>
